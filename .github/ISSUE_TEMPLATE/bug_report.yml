name: Bug report
description: Report a Token Workshop bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the Figma file state, token directory state, and exact actions.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Environment
      description: OS, Node.js version, Figma app/browser, and Token Workshop version.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal output, plugin messages, or screenshots.
