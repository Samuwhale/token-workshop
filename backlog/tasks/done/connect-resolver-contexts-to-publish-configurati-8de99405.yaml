status_notes:
  - "Context: The product has two disconnected systems for 'how token sets relate to Figma variable modes': (1) ResolverFile modifiers define contextual set combinations per dimension (e.g. Brand=Acme + Mode=Dark = these sets merged), and (2) per-set collectionName/modeName metadata (in SetSwitcher > Metadata Manager) manually maps each individual set to one Figma mode. Teams using resolvers to model multi-brand or multi-mode systems must manually mirror the resolver structure as per-set metadata, and the two configs can silently drift. The resolver is the canonical definition of how the token system maps to contexts, but the publish workflow ignores it entirely."
  - "Completed: Added resolver-owned context→Figma mode mappings in Publish, synced saved resolver combinations through token-level collection/mode writes, kept per-set routing as fallback, and validated core/server/figma-plugin builds."
state: done
acceptance_criteria:
  - "The publish configuration surface lets users define resolver-context-to-Figma-mode mappings: each modifier+context combination (e.g. ColorMode=Dark) maps to a target collection name and mode name"
  - The publish (apply-variables) path evaluates the resolver for each configured context and pushes the merged resolved tokens to the corresponding Figma mode, replacing the current flat per-set → single-mode model
  - Per-set collection/mode metadata is retained as a fallback for sets not covered by a resolver, ensuring backwards compatibility with non-resolver-based setups
  - A user with a resolver defining Brand × Mode dimensions can produce a Figma variable collection with all permutation modes in one publish run without manually configuring each contributing set
