status_notes:
  - "Context: The `deprecated` lifecycle state exists in the data model and is editable in TokenEditor. It shows visual treatment (strikethrough) in AliasAutocomplete and TokenPicker. Draft tokens gate the publish preflight. But deprecated tokens have no downstream enforcement: no lint rule catches aliases that still point to a deprecated token, no health surface lists which deprecated tokens are still actively referenced, and there is no migration path to redirect those references. A design system maintainer marking a token as deprecated today gets no automatic help finding or migrating its consumers. The health audit surface already owns unused-token detection, duplicate detection, and alias-opportunity promotion — it is the correct owner for deprecated-in-use detection and migration."
  - "Completed: Added deprecated-reference linting, a single-operation cross-set reference replacement route with undo support, and a HealthPanel deprecated-usage migration flow."
state: done
acceptance_criteria:
  - A new `references-deprecated-token` lint rule in the server lint service flags any token whose alias chain includes at least one deprecated token
  - The lint rule is registered in lintRules.ts and appears in LintConfigPanel so it can be enabled/disabled per preset
  - HealthPanel has a 'Deprecated in use' audit section that lists each deprecated token with its active reference count (how many other tokens still alias it)
  - "Each deprecated-in-use entry in HealthPanel offers a 'Replace references' action: a replacement-path picker that executes a bulk alias-rewrite, replacing every token that references the deprecated path with a chosen successor path"
  - The replacement action registers a single undo entry covering all rewritten tokens
