status_notes:
  - "Context: `enqueueMutation()` stores `previousDimensions = dimensions` before chaining the async task. Multiple rapid set-role edits from the same render can therefore share the same rollback snapshot, and a later failure can revert earlier successful mutations."
  - "Completed: Reworked queued theme role mutations to plan from execution-time state, keep separate working/committed snapshots, and roll back failures without erasing earlier successful queued changes."
state: done
acceptance_criteria:
  - Queued theme role mutations capture rollback state at execution time or from the latest committed dimensions state, so a failed later mutation cannot erase an earlier successful change that was queued ahead of it.
  - "`useThemeBulkOps` no longer closes over one stale `dimensions` snapshot for every queued task; optimistic update, rollback, and refresh behavior are defined in one queue-safe mutation path."
