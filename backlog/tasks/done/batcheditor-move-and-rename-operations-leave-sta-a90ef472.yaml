id: batcheditor-move-and-rename-operations-leave-sta-a90ef472
title: BatchEditor move and rename operations leave stale selection, breaking subsequent batch actions
priority: high
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/components/BatchEditor.tsx
  - packages/figma-plugin/src/ui/components/TokenList.tsx
capabilities: []
validation_profile: repo
status_notes:
  - "Context: Violates task-flow feedback and recovery principles: after a destructive-to-source batch move or a path-changing batch rename, the BatchEditor calls onApply (which refreshes tokens) but does not update selectedPaths. The toolbar continues to show the old count (e.g. '5 of 100 selected'), the Apply button says 'Apply to 5', but selectedEntries resolves to empty because the moved/renamed paths no longer match allTokensFlat. Further batch operations silently produce zero results. The parallel code paths in TokenList (handleBatchMoveToSet, handleBatchMoveToGroup) correctly clear selection after success, but the BatchEditor's own createBatchHandler and handleRename do not."
  - "Completed: BatchEditor now hands successful move/rename selection updates back to TokenList, clearing moved selections and remapping renamed paths so the batch UI stays in sync."
state: done
acceptance_criteria:
  - After a successful batch move via BatchEditor, selectedPaths is cleared or pruned so that the toolbar count and Apply button reflect the actual tokens available in the current set
  - After a successful batch rename via BatchEditor, selectedPaths is updated to the new paths so the user can continue operating on the same tokens
  - The batch editor does not remain open showing a stale selection count when the underlying token set no longer contains the selected paths
source: ux-pass
