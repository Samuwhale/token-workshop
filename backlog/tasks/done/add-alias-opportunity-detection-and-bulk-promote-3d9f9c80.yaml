status_notes:
  - "Context: The health surface already runs workspace-wide lint (validateAllTokens). Single-token alias extraction exists in useExtractToAlias.ts. What is missing is a lint rule that identifies N tokens sharing the same raw value and surfaces them as a named group with a one-click batch promote action — a core power-user job for enforcing alias hierarchy in a growing design system."
  - "Completed: Added grouped alias-opportunity linting, an atomic shared-alias promotion route, and HealthPanel promote actions that reuse the extract-to-alias workflow."
state: done
acceptance_criteria:
  - Server lint service detects tokens with identical raw values across the workspace and emits them as alias-opportunity issues (distinct severity from blocking errors)
  - Health panel surfaces alias-opportunity groups with a 'Promote to shared alias' batch action
  - Batch action reuses the existing useExtractToAlias logic to create one canonical primitive token and rewrites all N source tokens to reference it
  - Single-token 'Extract to alias' path remains unchanged; bulk path is additive
  - No alias-opportunity issues appear when all duplicates are already aliased or intentional
