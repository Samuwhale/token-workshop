status_notes:
  - "Context: The token-theme interaction is the most confusing area of the plugin. End users are Figma UI/UX designers and design system maintainers — not developers. The current model exposes a three-level hierarchy (dimensions → options → set-role assignments with Base/Override/Excluded priority) that requires understanding internal resolution semantics before a designer can create a simple light/dark theme."
  - "Pain point 1: Too many concepts exposed simultaneously — dimensions, options, set roles, coverage gaps, stale sets, empty overrides, and resolver contexts all appear in the authoring flow. A designer creating a basic brand theme must navigate the same affordances as someone building a multi-dimensional token system."
  - "Pain point 2: Three competing mental models — theme authoring (visual tree), set-role assignment (priority logic), and coverage analysis (diagnostic view) are separate screens that break focus and require round-trips to act on findings."
  - "Pain point 3: Resolver mode is presented as a toggle inside authoring with no clear guidance on when to use it vs. standard dimensions. The boundary between 'simple theming' and 'advanced resolution' is invisible."
  - "Pain point 4: Nine specialized hooks (1,793 lines) manage fragmented state with mutation chaining, optimistic rollback, and manual undo wiring — this complexity leaks into the UI as inconsistent feedback and half-failed bulk operations."
  - "Goal: Research and propose a simplified interaction model that lets designers build themes through direct, intent-based actions (e.g., 'create a light/dark theme', 'add a brand variant') without requiring them to understand set-role priority, coverage diagnostics, or resolver internals. Progressive disclosure should gate advanced concepts behind explicit opt-in."
  - "Completed: Added the theme UX audit under scripts/backlog/research, logged the progress and reusable pattern, and queued follow-up implementation slices; the inbox queue is auto-drained in this repo."
state: done
acceptance_criteria:
  - Research deliverable documents the current concept hierarchy and identifies which concepts can be hidden, merged, or deferred for the common case
  - Proposes a simplified authoring model where a designer can create a basic theme variant (e.g., light/dark) without encountering set-role priority logic, coverage diagnostics, or resolver configuration
  - Defines a progressive disclosure strategy that gates advanced features (multi-dimensional themes, resolvers, coverage analysis) behind explicit user actions
  - Identifies which of the nine theme hooks can be consolidated and proposes a target state for theme state management
  - Addresses the resolver vs. dimensions boundary with a clear recommendation for when each is presented to the user
