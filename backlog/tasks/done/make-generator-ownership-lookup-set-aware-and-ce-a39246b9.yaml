status_notes:
  - "Context: Theme and variant sets intentionally reuse token paths, but `useTokens.ts` and `useGenerators.ts` both collapse ownership to plain paths and `useTokenSave.ts` never checks `generator.targetSet` before detaching. That makes generator metadata vulnerable to first-set-wins collisions and wrong-generator detach behavior."
  - "Completed: Added shared managed-output helpers in core, switched server/UI ownership lookups to set-qualified keys, and updated detach/search/editor/preview flows to use the set-aware generator index."
state: done
acceptance_criteria:
  - Generator step-name parsing and detached-path filtering live in one shared helper instead of separate copies in server and UI files.
  - Generator ownership indexes use a set-aware identity (`set + path` or equivalent) rather than plain token paths, so repeated token paths across sets do not overwrite each other.
  - Detach actions and generator ownership indicators in the token tree/editor/preview/search flows read the set-aware lookup and no longer depend on ambiguous path-only matches.
