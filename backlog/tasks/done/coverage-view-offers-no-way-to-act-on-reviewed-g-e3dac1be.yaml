status_notes:
  - "Context: Violates handoff principle: context does not survive when the task crosses panels. The intended task is: see gaps → understand gaps → fill gaps. ThemeAuthoringScreen presents 'Review gaps' and 'Auto-fill gaps' as peer actions (lines 1105-1163). Choosing 'Review gaps' opens ThemeCoverageScreen, which has only a back button and axis toggle — no auto-fill action (confirmed: zero autoFill references in ThemeCoverageScreen.tsx). The user must click 'Back to set roles', mentally locate the same dimension context in the Authoring view, and then click 'Auto-fill gaps'. The coverage matrix provides the information needed to decide whether to auto-fill, but the action is only available in the surface the user navigated away from."
  - "Completed: Added an in-context auto-fill CTA to Coverage, backed by a shared target resolver, and verified with `pnpm --filter @tokenmanager/figma-plugin build`."
state: done
acceptance_criteria:
  - After reviewing the coverage matrix, the user can initiate auto-fill (or navigate directly to it) from the Coverage view without first returning to the Authoring view
  - The auto-fill preview and strategy confirmation flow works identically regardless of entry point
