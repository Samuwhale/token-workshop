  - "Context: Findability and consistency: the token library toolbar has an 'Add filter' button that becomes 'Filters' when structured filters are active (L4609). The View options popover also contains a section labeled 'Filters' (L4914). These two 'Filters' entry points serve genuinely different mechanisms — the toolbar opens a structured query builder for composing search qualifiers, while the View options section holds sort order, quick browse toggles, and presets. Users trying to filter tokens encounter identical labels on controls that work differently, making it unclear which entry point does what. Renaming the popover section to 'Show' or 'Browse' would distinguish quick display modifiers from the structured filter builder."
