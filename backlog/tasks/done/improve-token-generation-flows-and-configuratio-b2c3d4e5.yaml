validation_profile: repo
status_notes:
  - "Context: The generator system supports 11 types (color ramp, type scale, spacing scale, border radius, opacity, z-index, shadow, custom formula, plus 3 advanced). End users are Figma designers who want to create systematic token scales — they think in outcomes ('I need a consistent spacing scale') not configuration parameters."
  - "Pain point 1: The three-phase wizard (StepWhat → StepWhere → StepReview) is fragmented. Type selection is buried in a dropdown requiring commitment before seeing descriptions. No intent-based discovery ('I want consistent spacing' → suggested generator type)."
  - "Pain point 2: Generator configuration varies wildly per type (lightness curves, base steps and ratios, formula syntax) with no templates or quickstarts to reduce the learning curve. Token refs ($tokenRefs) for dynamic parameterization are undiscoverable."
  - "Pain point 3: Semantic alias mappings feel tacked-on — they appear only in StepReview after configuration, not as a first-class planning step. Designers don't plan aliases; they discover them by accident."
  - "Pain point 4: No generator dashboard with status, staleness indicators, dependency chains, or quick-run buttons. Chained generator dependencies lack visibility — no way to see 'this generator depends on that one' or what happens if an upstream fails."
  - "Pain point 5: Preview-to-save disconnect — live preview shows tokens but overwrite detection only runs on save. If a token was manually edited since preview, designers see surprises at confirmation time."
  - "Goal: Research and propose an improved generation flow that starts from designer intent, provides templates and guided configuration, makes semantic mapping a first-class planning step, and surfaces generator status and dependencies in a dashboard view."
  - "Completed: Added a generator-flow research audit, recorded progress, and queued five follow-up implementation tasks for intent-first discovery, presets, semantic planning, dashboard metadata, and preview conflict handling."
state: done
acceptance_criteria:
  - Research deliverable documents the current generation wizard flow and identifies friction points for each generator type
  - Proposes an intent-based generator discovery model (goal-first, not type-first) with templates or presets that reduce configuration burden
  - Recommends how semantic alias mapping should be surfaced earlier in the flow as a planning step rather than a review-only afterthought
  - Proposes a generator dashboard surface showing status, staleness, dependency chains, and quick re-run actions
  - Addresses the preview-to-save gap with a recommendation for surfacing overwrite detection and manual-edit conflicts before confirmation
