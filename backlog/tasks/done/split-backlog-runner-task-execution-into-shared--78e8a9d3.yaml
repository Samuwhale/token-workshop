  - "Context: `runTaskWorker()` interleaves preflight, agent execution, validation, remediation, merge, and finalize logic in one 250-line control flow, while remediation and reconciliation duplicate their own provider-run, validation, queue-drain, and completion semantics. That makes scheduler behavior hard to change safely."
