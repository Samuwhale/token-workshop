status_notes:
  - "Context: Minimalism and chrome discipline: WorkspaceSummaryHeader is the shared shell header rendered across every workspace. It accumulates three independent eyebrow-text treatments — 'Sections' above tabs (line 152), 'Workspace'/'Surface' prefix labels in the breadcrumb row (line 101), and 'Context' pills inside section tab buttons (line 183) — none of which carry navigation value that the surrounding visual elements do not already provide. Because this component appears on every workspace, each instance adds the same persistent chrome overhead. The 'Sections' label is the clearest case: tab strips are universally understood controls that do not need a labeled wrapper."
  - "Completed: Simplified WorkspaceSummaryHeader chrome by removing breadcrumb meta labels, dropping the Sections eyebrow, and changing contextual tab badges to inline text."
state: done
acceptance_criteria:
  - The 'Sections' uppercase tracking label above the section tab strip is removed; the tab strip is self-evident and does not need a label
  - The breadcrumb row no longer uses 'Workspace' or 'Surface' as uppercase tracking meta-labels before the workspace/context pill chain
  - The 'Context' uppercase tracking pill inside individual section tab buttons is removed or replaced with a plain text indicator that does not use the uppercase+tracking treatment
  - No new chrome or explanatory copy is added in place of the removed labels — the result is a simpler header row across all workspaces that use this component
