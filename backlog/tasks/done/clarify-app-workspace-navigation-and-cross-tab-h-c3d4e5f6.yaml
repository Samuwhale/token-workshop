id: clarify-app-workspace-navigation-and-cross-tab-h-c3d4e5f6
title: Clarify the app workspace navigation and cross-tab handoffs so designers always know where they are, what each section does, and how to move between related tasks
priority: high
task_kind: research
depends_on: []
