  - packages/figma-plugin/src/ui/components/AppShell.tsx
  - packages/figma-plugin/src/ui/components/PanelRouter.tsx
  - packages/figma-plugin/src/ui/navigation/navigationTypes.ts
  - packages/figma-plugin/src/ui/navigation/useWorkspaceRouter.ts
  - packages/figma-plugin/src/ui/components/WorkspaceTabBar.tsx
capabilities: []
validation_profile: repo
status_notes:
  - "Context: The plugin presents 5 top-level workspaces (Tokens, Themes, Apply, Sync, Audit) plus secondary surfaces (Import, Sets, Notifications, Shortcuts, Settings). End users are Figma designers and design system maintainers who need to move fluidly between defining tokens, theming them, applying them to canvas, syncing to Figma variables, and auditing quality."
  - "Pain point 1: The internal two-tier routing (define/apply/ship tabs with sub-tabs) is hidden behind a five-workspace facade. The mapping is opaque — Audit aggregates routes from both 'ship' and 'apply' internal tabs, so Dependencies lives under Audit but is technically an Apply route."
  - "Pain point 2: Section vs. workspace ambiguity — sub-sections within a workspace (Library/Generators, Selection/Canvas, Figma Sync/Handoff files) look like peer-level navigation but route to different internal tab groups. No visual distinction between depth levels."
  - "Pain point 3: Cross-workspace handoffs are invisible — completing an import recommends jumping to Tokens, audit issues link to source tokens, coverage gaps route to theme authoring. These transitions work but lack breadcrumbs, return paths, or contextual framing for why the user landed somewhere new."
  - "Pain point 4: The relationship between workspaces is not communicated — a designer doesn't know that the typical workflow is Tokens → Themes → Apply → Sync, or that Audit can be used at any point. There's no visual or structural cue about how the pieces fit together."
  - "Goal: Research and propose a navigation model where the workspace structure, section hierarchy, and cross-workspace handoffs are self-explanatory to a designer who has never used the plugin before. The interplay between defining, theming, applying, syncing, and auditing should be discoverable from the navigation itself."
  - "Deferred after remediation: dirty workspace preflight: staged packages/core/src/generator-types.ts, packages/figma-plugin/src/ui/components/MetadataEditor.tsx, packages/figma-plugin/src/ui/components/TokenEditor.tsx, packages/figma-plugin/src/ui/components/TokenGeneratorDialog.tsx, packages/figma-plugin/src/ui/components/TokenList.tsx, packages/figma-plugin/src/ui/components/TokenTreeNode.tsx, packages/figma-plugin/src/ui/components/generator-steps/StepReview.tsx, packages/figma-plugin/src/ui/components/generator-steps/StepWhat.tsx until 2026-04-12T23:03:57.770Z"
  - "Completed: stale — already done."
state: done
acceptance_criteria:
  - Research deliverable maps the current routing model (internal tabs, workspace facade, section sub-tabs) and identifies where the abstraction leaks
  - Proposes a navigation hierarchy where the depth level (workspace vs. section vs. contextual screen) is always visually distinguishable
  - Recommends breadcrumb or return-path patterns for cross-workspace transitions so users always know how to get back
  - Addresses the workflow relationship between workspaces with a recommendation for progressive onboarding or structural cues that communicate how Tokens, Themes, Apply, Sync, and Audit relate
  - Identifies which secondary surfaces (Import, Sets, Notifications, Settings) should be promoted, demoted, or repositioned in the navigation hierarchy
