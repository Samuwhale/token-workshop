  - "Context: Hierarchy and recognition over recall: the Audit workspace (navigationTypes.ts line 488) contains a first section also labeled 'Audit' (label: 'Audit', subTab: 'health'). When a user is in this workspace, the workspace tab and the section tab read identically — 'Audit / Audit' — which is tautological and gives users no information about what the section contains. The section's purpose is quality checks and lint validation, which is not conveyed by repeating the parent label. A label like 'Issues' or 'Quality' would let users scan the section tabs and understand what each one offers without prior knowledge."
