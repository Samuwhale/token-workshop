  - Clicking a chip re-opens its section for editing inline (replacing the separate filter builder panel).
  - The standalone filter builder panel and its trigger button are removed.
  - Query qualifier syntax is removed from user-facing documentation — structured autocomplete replaces it entirely.
  - Filter state persists across set switches via localStorage (existing behavior, preserved).
