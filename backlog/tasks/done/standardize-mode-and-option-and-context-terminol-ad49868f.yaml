id: standardize-mode-and-option-and-context-terminol-ad49868f
title: Standardize mode and option and context terminology to use option everywhere
priority: normal
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/panels/ResolverPanel.tsx
  - packages/figma-plugin/src/ui/panels/ThemeManager.tsx
  - packages/figma-plugin/src/ui/components/publish/SyncSubPanel.tsx
  - packages/figma-plugin/src/ui/components/CompareView.tsx
capabilities:
  - react
