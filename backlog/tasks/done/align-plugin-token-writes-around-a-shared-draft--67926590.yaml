status_notes:
  - "Context: `packages/server/src/routes/tokens.ts` already validates unknown request bodies at runtime, but the UI helper currently types those bodies as `Partial<Token>`. That mismatch leaks through every token-writing surface, forcing unsafe casts and duplicating conversion rules for resolved canvas values, theme autofill values, and inline editor saves."
  - "Completed: Replaced the plugin’s `Partial<Token>` write typing with an explicit request contract, centralized type/value/scope normalization, updated the touched write paths to use it, and verified the touched token-writing files no longer report token-body type mismatches."
