id: add-create-and-bind-action-to-canvas-analysis-su-b3d532f3
title: Add create-and-bind action to canvas analysis surface for hardcoded values that have no matching token
priority: normal
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/components/CanvasAnalysisPanel.tsx
  - packages/figma-plugin/src/ui/components/HeatmapPanel.tsx
  - packages/figma-plugin/src/ui/components/ConsistencyPanel.tsx
  - packages/figma-plugin/src/ui/components/ExtractTokensPanel.tsx
capabilities: []
validation_profile: plugin
status_notes:
  - "Context: CanvasAnalysisPanel (HeatmapPanel + ConsistencyPanel) owns 'identify untokenized layers and fix them' but only supports binding to existing tokens. When a hardcoded value has no matching token, both panels dead-end: the user must navigate to Define > Tokens, create the token manually, navigate back to Apply > Canvas, find the layers again, and bind them. ExtractTokensPanel already has the extract-from-selection + bind back flow, but it is a separate modal surface not accessible from canvas analysis results. The canvas analysis surface owns the job of resolving untokenized values but only half-completes it."
  - "Completed: Canvas cleanup now opens one shared create-and-bind flow from heatmap rows and rejected consistency matches, with heatmap scan values normalized so new tokens can be created and rebound in place."
state: done
acceptance_criteria:
  - HeatmapPanel exposes a 'Create token' action on unbound-layer rows or value groups when no existing token matches the value
  - The action opens a lightweight inline or modal creation flow (reusing ExtractTokensPanel logic or a subset of it) that pre-fills the token value from the canvas value and lets the user set the path and target set
  - On creation the new token is immediately bound to the originating layers without requiring the user to navigate to Define > Tokens and back
  - ConsistencyPanel near-match results that the user explicitly rejects (e.g. 'not close enough') offer the same 'Create token for this value' fallback action
source: product-pass
