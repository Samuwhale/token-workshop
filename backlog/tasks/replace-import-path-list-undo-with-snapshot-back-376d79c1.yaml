id: replace-import-path-list-undo-with-snapshot-back-376d79c1
title: Replace import path-list undo with snapshot-backed rollback for overwrite, skip, merge, and retry flows
priority: high
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/components/ImportPanelContext.tsx
  - packages/server/src/routes/tokens.ts
