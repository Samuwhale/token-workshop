id: remap-bindings-task-drops-context-at-every-hando-0d81df85
title: "Remap bindings task drops context at every handoff: sync warning gives no signpost to Remap, pre-fill clears on deselect, from-field autocomplete cannot find stale paths, and ambiguous completion feedback leaves users unsure whether the remap worked"
priority: high
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/components/RemapBindingsPanel.tsx
  - packages/figma-plugin/src/ui/components/RemapAutocompleteInput.tsx
  - packages/figma-plugin/src/ui/components/SelectionInspector.tsx
  - packages/figma-plugin/src/ui/components/SelectionSyncStatusPill.tsx
capabilities: []
validation_profile: plugin
status_notes:
  - "Context: Violates cognitive-walkthrough questions 1-4 across the full sync→remap task: users cannot discover the correct next action from the sync warning (Q1-3), the from-field autocomplete undermines task completion by searching only current tokens when the user needs stale paths (Q2-3), pre-fill fragility forces context re-entry after accidental deselect (task load / Q7), and ambiguous 'No matches found' prevents users from confirming whether the task succeeded (Q4). The compounding effect is that every handoff in the flow loses context the user previously had."
state: ready
acceptance_criteria:
  - Sync warning pill or result banner includes a direct action to open Remap with missing tokens pre-filled
  - Pre-filled missing-token rows survive at least one node deselect-reselect cycle without clearing
  - The from-field autocomplete can match paths that exist in layer bindings but not in the current token map, so users can find stale paths without typing from memory
  - When all rows are filtered out as invalid (from===to or empty), the Remap button shows inline feedback instead of silently returning
  - Completion result distinguishes 'paths matched but no layers used them' from 'no layers on the page/selection had any matching bindings'
  - After a successful remap, rows reset or the panel offers a clear done/close action so users do not accidentally re-run the same mapping
source: ux-pass
