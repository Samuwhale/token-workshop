acceptance_criteria:
  - Toolbar `New token`, the `TOKEN_NEW` keyboard shortcut, search-no-results create suggestions, inline sibling create, and create-from-empty all dispatch into one create-launcher state instead of opening TokenList-local create UI directly.
  - The create launcher owns one draft for set, group, path, type, and value, and that draft survives escalation between lightweight start and full editor presentations without duplicating mounted create UIs.
  - Canceling or completing creation restores the same Tokens browse context the user came from, and the old single-token inline create form path in `packages/figma-plugin/src/ui/components/TokenList.tsx` is removed as a competing entry flow.
