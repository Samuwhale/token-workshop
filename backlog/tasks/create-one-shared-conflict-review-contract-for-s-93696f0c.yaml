status_notes:
  - "Context: Styles imports escalate into ImportConflictResolver with per-token decisions, while variables imports only expose batch strategy buttons and success/failure happens after the view resets. The redesign should define one review handoff model before deeper UI changes."
state: ready
acceptance_criteria:
  - Single-set and multi-set imports use consistent language for new tokens, overwrites, merges, skips, and post-import failures so the user does not have to relearn conflict behavior by source type.
  - Conflict previews and commit actions expose one recommended next action per review state, with explicit consequences for overwrite, merge, and keep-existing paths.
  - Partial failures after apply hand back enough set/path context to continue review or retry without collapsing into an isolated success screen.
