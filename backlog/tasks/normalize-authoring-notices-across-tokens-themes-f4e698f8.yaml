status_notes:
  - "Context: Research found four competing patterns in authoring flows: top-of-panel banners in TokenList, issue cards and badges in ThemeManager, inline status text plus persistent suggestion rails in SelectionInspector, and row-local alert boxes in PropertyRow. Adoption should preserve the existing workflows but align severity and placement."
state: ready
acceptance_criteria:
  - Convert authoring-surface warnings and stale cues to the shared notice primitives, including stale generators, theme issue handoff cards, apply maintenance results, and property binding failures.
  - Use field-level validation consistently for token/create/edit inputs instead of mixed inline paragraphs and one-off amber/red classes.
  - Keep remediation CTAs attached to the owning notice so theme/apply/token authoring problems can be resolved without depending on shell pills or toast-only feedback.
