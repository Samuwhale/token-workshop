title: Split the Tokens library controller and tree context so row rendering no longer depends on one giant `TokenList` state graph
priority: normal
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/components/TokenList.tsx
  - packages/figma-plugin/src/ui/components/TokenTreeNode.tsx
