status_notes:
  - "Context: `TokenList.tsx` is over 6k lines and still owns toolbar state, review-panel coordination, virtualization, batch workflows, sync review, and the provider value for a very large `TokenTreeContextType`. `TokenTreeNode.tsx` then mixes that context with its own 4k-line leaf/group renderers, which keeps row behavior tightly coupled to every list-level concern."
state: ready
acceptance_criteria:
  - "`TokenList.tsx` becomes a thin workspace shell that composes focused controllers/components for browsing, bulk workflows, review surfaces, and view preferences instead of owning all of that state in one component."
  - "`TokenTreeContextType` is replaced by smaller read/action contexts or explicit props so token rows only subscribe to the state they actually use, rather than a single dozens-field context object rebuilt from `TokenList`."
  - Tree-row editing and list-level review flows no longer share one component-level state graph, so row behavior changes stop requiring edits across unrelated toolbar, review-panel, and virtualization code.
