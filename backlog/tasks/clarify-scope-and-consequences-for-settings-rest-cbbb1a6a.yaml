status_notes:
  - "Context: The current `Import settings` action shares vocabulary with the full Import secondary surface from `WelcomePrompt`, and the reload consequence only appears after the user has already parsed a file. The danger copy says `local workspace` even though the action also wipes server-backed persisted state through `/api/data`."
  - "Completed: Updated SettingsPanel copy to separate preferences backup/restore from token import, surface reload loss before apply, and spell out reset delete scope versus state that survives."
state: done
acceptance_criteria:
  - Settings backup/import copy distinguishes preference restore from token-system import and labels the action scope as settings/preferences only.
  - The restore confirmation states before apply that the plugin will reload and unsaved editor or panel state will be lost, while keeping the changed-settings preview.
  - Danger-zone messaging explicitly names what the reset deletes (`tokens`, `themes`, `sets`, generators/resolvers/history on the local server) and what it does not reset automatically (for example onboarding/start-flow completion state) so the consequence is unambiguous.
