id: paste-tokens-modal-resets-all-per-row-overwrite--19cda551
title: Paste tokens modal resets all per-row overwrite decisions on any textarea edit and undo after overwrite deletes the pre-existing token instead of restoring it
priority: normal
task_kind: implementation
depends_on: []
touch_paths:
  - packages/figma-plugin/src/ui/components/PasteTokensModal.tsx
capabilities: []
validation_profile: plugin
status_notes:
  - "Context: Violates recovery (Q6) and task load (Q7): users who carefully review 10+ conflict rows and then fix a typo in the input must redo all overwrite decisions because the useEffect at line 107 resets rowOverwrites on any input change. The undo path is worse — it calls batch-delete with force:true on all pasted paths, which destroys tokens that existed before the paste rather than restoring their original values. Together these make the paste-with-conflicts task unreliable for cautious users who most need the review step."
state: ready
acceptance_criteria:
  - Editing the textarea preserves overwrite checkbox state for conflict rows whose path did not change after reparse
  - Undo for a paste that overwrote existing tokens restores those tokens to their pre-paste values instead of deleting them
  - If invalid rows were silently excluded from the batch, the success toast or post-close state communicates how many tokens were skipped and why
source: ux-pass
